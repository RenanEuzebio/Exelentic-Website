<!-- section1.html -->
<div class="section section1">
    <!-- Exclusive CSS for Section 1 -->
    <style>
        /* Ensure the styles are scoped to section1 to avoid affecting other sections */
        .section1 .container {
            max-width: 900px; /* Increased max width for larger content area */
            padding: 40px; /* Increased padding for more spacious layout */
        }

        .section1 h1 {
            font-size: 4.5rem; /* Larger font size for the main heading */
            line-height: 1.2;
            margin-bottom: 40px; /* Increased margin for better spacing */
            color: var(--text-color); /* Consistent text color */
        }

        .section1 p {
            font-size: 2rem; /* Larger font size for the paragraph */
            line-height: 1.6;
            margin-bottom: 50px; /* Increased margin for better spacing */
            color: #333333; /* Darker text for better readability */
        }

        .section1 .buttons {
            display: flex;
            justify-content: center;
            gap: 30px; /* Increased gap between buttons */
        }

        .section1 .button {
            padding: 18px 36px; /* Enlarged padding for bigger buttons */
            font-size: 1.4rem; /* Larger font size for button text */
            border-radius: 10px; /* More rounded corners */
            transition: background-color 0.3s, transform 0.2s;
        }

        .section1 .button.primary {
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
        }

        .section1 .button.primary:hover {
            background-color: #1a5bb8; /* Darker shade on hover */
            transform: translateY(-3px); /* Slight lift on hover */
        }

        .section1 .button.secondary {
            background-color: #ffffff;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
        }

        .section1 .button.secondary:hover {
            background-color: #e0f0ff; /* Light blue background on hover */
            transform: translateY(-3px); /* Slight lift on hover */
        }

        /* Responsive Adjustments for Section 1 */
        @media (max-width: 768px) {
            .section1 h1 {
                font-size: 3rem; /* Adjusted font size for smaller screens */
            }

            .section1 p {
                font-size: 1.6rem; /* Adjusted font size for smaller screens */
            }

            .section1 .button {
                padding: 14px 28px; /* Reduced padding for smaller screens */
                font-size: 1.2rem; /* Reduced font size for button text */
            }

            .section1 .buttons {
                flex-direction: column;
                gap: 20px; /* Reduced gap for vertical layout */
            }
        }
    </style>

    <div class="container animate-on-scroll animate-top">
        <h1>If you hate it,<br>automate it!</h1>
        <p>
            Entdecken Sie unsere <strong>Robotic Process Management (RPA)</strong>-Lösungen zur Kostensenkung, 
            Effizienzsteigerung, Skalierbarkeit, Fehlerbeseitigung und vielem mehr.
        </p>
        <div class="buttons">
            <button class="button primary">Kontaktieren Sie uns</button>
            <button class="button secondary">Mehr erfahren</button>
        </div>
    </div>
</div>
