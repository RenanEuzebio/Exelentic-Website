<!-- section1.html -->
<div class="section section1">
    <style>
        .section1 .container {
            max-width: 900px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Align to the left */
            text-align: left; /* Align text to the left */
        }

        .section1 h1 {
            font-size: 4.5rem;
            line-height: 1.2;
            margin-bottom: 40px;
            color: var(--text-color);
        }

        .section1 p {
            font-size: 2rem;
            line-height: 1.6;
            margin-bottom: 50px;
            color: #333333;
            max-width: 800px;
        }

        .section1 .buttons {
            display: flex;
            justify-content: flex-start;
            gap: 30px;
            flex-wrap: wrap;
        }

        .section1 .button {
            padding: 18px 36px;
            font-size: 1.4rem;
            border-radius: 10px;
            transition: background-color 0.3s, transform 0.2s;
            cursor: pointer;
        }

        .section1 .button.primary {
            background-color: var(--accent-color);
            color: #ffffff;
        }

        .section1 .button.primary:hover {
            background-color: #1a5bb8;
            transform: translateY(-3px);
        }

        .section1 .button.secondary {
            background-color: #ffffff;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
        }

        .section1 .button.secondary:hover {
            background-color: #e0f0ff;
            transform: translateY(-3px);
        }

        @media (max-width: 1200px) {
            .section1 .container { max-width: 80%; padding: 30px; }
            .section1 h1 { font-size: 3.5rem; }
            .section1 p { font-size: 1.8rem; margin-bottom: 40px; }
        }

        @media (max-width: 768px) {
            .section1 .container { max-width: 100%; padding: 20px; }
            .section1 h1 { font-size: 3rem; }
            .section1 p { font-size: 1.6rem; margin-bottom: 30px; }
            .section1 .buttons { flex-direction: column; gap: 20px; }
        }
    </style>

    <div class="container animate-on-scroll animate-top">
        <h1>If you hate it,<br>automate it!</h1>
        <p>
            Entdecken Sie unsere <strong>Robotic Process Management (RPA)</strong>-Lösungen zur Kostensenkung, 
            Effizienzsteigerung, Skalierbarkeit, Fehlerbeseitigung und vielem mehr.
        </p>
        <div class="buttons">
            <button class="button primary">Kontaktieren Sie uns</button>
            <button class="button secondary">Mehr erfahren</button>
        </div>
    </div>
</div>
